<div class="search-results-page">
    <div class="container py-12">
        <nz-result nzStatus="404" nzTitle="Không tìm thấy kết quả"
            nzSubTitle="Xin lỗi, chúng mình không tìm thấy trang phục nào khớp với từ khóa của bạn.">
            <div nz-result-extra>
                <button nz-button nzType="primary" routerLink="/costumes">Xem tất cả trang phục</button>
                <button nz-button routerLink="/">Quay lại trang chủ</button>
            </div>
        </nz-result>

        <div class="suggestions-section mt-16">
            <h3 class="suggestion-title">Có thể bạn sẽ thích</h3>
            <div nz-row [nzGutter]="24">
                <div nz-col [nzXs]="24" [nzSm]="12" [nzLg]="6" *ngFor="let item of suggestions">
                    <nz-card nzHoverable class="suggestion-card" [nzCover]="coverTemplate">
                        <ng-template #coverTemplate>
                            <img [alt]="item.name" [src]="item.image" />
                        </ng-template>
                        <nz-card-meta [nzTitle]="item.name" [nzDescription]="priceTemplate"></nz-card-meta>
                        <ng-template #priceTemplate>
                            <div class="price-box">
                                <span class="price">{{item.price}}</span>
                                <span class="unit">{{item.unit}}</span>
                            </div>
                        </ng-template>
                    </nz-card>
                </div>
            </div>
        </div>
    </div>
</div>
