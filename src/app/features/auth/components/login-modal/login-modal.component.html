<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
  <!-- Login Modal Container -->
  <div class="bg-white dark:bg-background-dark w-full max-w-[500px] rounded-lg shadow-2xl overflow-hidden border border-border-gray dark:border-primary/20">
    <!-- Modal Header -->
    <div class="px-8 pt-10 pb-6 text-center">
      <div class="flex justify-center mb-4">
        <div class="w-12 h-12 bg-primary flex items-center justify-center rounded-xl text-white shadow-lg">
          <span nz-icon nzType="appstore" nzTheme="outline" class="text-2xl"></span>
        </div>
      </div>
      <h1 class="text-[#131416] dark:text-white text-2xl font-bold tracking-tight">Welcome back</h1>
      <p class="text-[#6e757c] dark:text-gray-400 text-sm mt-2">Ready for your next cosplay transformation?</p>
    </div>

    <!-- Social Login Buttons -->
    <div class="px-8 space-y-3 mb-8">
      <button nz-button nzType="default" class="w-full h-[54px] rounded-lg border border-border-gray dark:border-white/10 bg-white dark:bg-white/5 hover:bg-input-gray dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3">
        <img alt="Google" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyAaYw5HYP9_OX3F_07KthWS_2wFN5J28Q3GZXpEN1LmB0p7ftX73GkXsJGl1eSfClIf02KgDkRRAlJ8TlGOsiE_gtbo2gA4jgellLbjywqaQF9QgVCJiHgUp8mKgh_TNosxWe0E3m2zd3lwNeiUxYYOuV7kl4_nuY18N0vywWpEPfIDZ1f4VzUK0boHOzgI5Oq_fPTx_H-aSI81VN9ZCTmng6W-bBre-_D2C8aM4n85-fuJ_hbBa5dhUmbapE4PZ9dd21u3V5V_vo" />
        <span class="font-medium">Continue with Google</span>
      </button>
      <button nz-button nzType="default" class="w-full h-[54px] rounded-lg border border-border-gray dark:border-white/10 bg-white dark:bg-white/5 hover:bg-input-gray dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3">
        <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
        </svg>
        <span class="font-medium">Continue with Facebook</span>
      </button>
    </div>

    <!-- Divider -->
    <div class="px-8 flex items-center gap-4 mb-8">
      <div class="h-[1px] flex-1 bg-border-gray dark:bg-white/10"></div>
      <span class="text-[#6e757c] text-sm font-medium">Or login with email</span>
      <div class="h-[1px] flex-1 bg-border-gray dark:bg-white/10"></div>
    </div>

    <!-- Login Form -->
    <form class="px-8 space-y-5" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="flex flex-col gap-2">
        <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold px-1">Email Address</label>
        <nz-input-group nzSize="large" nzPrefixIcon="mail">
          <input formControlName="email" nz-input type="email" placeholder="name@example.com" />
        </nz-input-group>
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-error text-sm px-1">
          Please enter a valid email address
        </div>
      </div>

      <!-- Password Field -->
      <div class="flex flex-col gap-2">
        <div class="flex justify-between items-center px-1">
          <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold">Password</label>
          <a class="text-xs font-bold text-primary hover:underline transition-all" routerLink="/forgot-password">Forgot password?</a>
        </div>
        <nz-input-group nzSize="large" nzPrefixIcon="lock" [nzSuffix]="suffixTemplate">
          <input formControlName="password" nz-input [type]="passwordVisible ? 'text' : 'password'" placeholder="Enter your password" />
        </nz-input-group>
        <ng-template #suffixTemplate>
          <button type="button" class="text-xs font-bold text-[#6e757c] hover:text-primary transition-colors uppercase tracking-wider" (click)="togglePasswordVisibility()">
            {{ passwordVisible ? 'Hide' : 'Show' }}
          </button>
        </ng-template>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-error text-sm px-1">
          Password must be at least 8 characters
        </div>
      </div>

      <!-- Login Button -->
      <button nz-button nzType="primary" class="w-full h-14 font-bold text-lg rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4"
              [disabled]="loginForm.invalid" type="submit">
        <span>Login</span>
        <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
      </button>
    </form>

    <!-- Footer -->
    <div class="px-8 py-8 mt-2 text-center border-t border-border-gray/50 dark:border-primary/10">
      <p class="text-sm text-[#6e757c] dark:text-gray-400">
        Don't have an account? <a class="text-primary font-bold hover:underline ml-1" routerLink="/signup">Sign up</a>
      </p>
    </div>
  </div>
</div>

<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-primary/10 via-primary to-primary/10 opacity-50"></div>
