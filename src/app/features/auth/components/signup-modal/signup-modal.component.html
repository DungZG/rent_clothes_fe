<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
  <!-- Registration Modal Container -->
  <div class="bg-white dark:bg-background-dark w-full max-w-[500px] rounded-lg shadow-2xl overflow-hidden border border-border-gray dark:border-primary/20">
    <!-- Modal Header -->
    <div class="px-8 pt-10 pb-6 text-center">
      <h1 class="text-[#131416] dark:text-white text-2xl font-bold tracking-tight">Create Account</h1>
      <p class="text-[#6e757c] dark:text-gray-400 text-sm mt-2">Join the premier cosplay community in Vietnam.</p>
    </div>

    <!-- Registration Form -->
    <form class="px-8 space-y-5" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <!-- Full Name Field -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold">Full Name</label>
        <nz-input-group nzSize="large">
          <input formControlName="fullName" nz-input placeholder="Nguyen Van A" />
        </nz-input-group>
        <div *ngIf="signupForm.get('fullName')?.invalid && signupForm.get('fullName')?.touched" class="text-error text-sm">
          Full name is required
        </div>
      </div>

      <!-- Email Address Field -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold">Email Address</label>
        <nz-input-group nzSize="large" nzPrefixIcon="mail">
          <input formControlName="email" nz-input type="email" placeholder="email@example.com" />
        </nz-input-group>
        <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched" class="text-error text-sm">
          Please enter a valid email address
        </div>
      </div>

      <!-- Password Field with Strength Indicator -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold">Password</label>
        <nz-input-group nzSize="large" nzPrefixIcon="lock">
          <input formControlName="password" nz-input type="password" placeholder="Min. 8 characters" />
        </nz-input-group>

        <!-- Password Strength Meter -->
        <div class="mt-2 flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <span class="text-[11px] font-medium text-gray-500 uppercase tracking-wider">Password strength</span>
            <span class="text-[11px] font-bold text-primary">{{ passwordStrength | titlecase }}</span>
          </div>
          <div class="h-1.5 w-full bg-border-gray dark:bg-gray-700 rounded-full overflow-hidden">
            <div class="h-full transition-all"
                 [class]="passwordStrength === 'weak' ? 'bg-error w-1/3' :
                         passwordStrength === 'medium' ? 'bg-warning w-2/3' : 'bg-success w-full'">
            </div>
          </div>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[#131416] dark:text-gray-200 text-sm font-semibold">Confirm Password</label>
        <nz-input-group nzSize="large">
          <input formControlName="confirmPassword" nz-input type="password" placeholder="Re-enter password" />
        </nz-input-group>
        <div *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched" class="text-error text-sm">
          Passwords must match
        </div>
      </div>

      <!-- Agreement Checkbox -->
      <div class="flex items-start gap-3 py-2">
        <nz-checkbox formControlName="terms"></nz-checkbox>
        <label class="text-sm text-[#6e757c] dark:text-gray-400 leading-relaxed cursor-pointer select-none">
          I agree to the <a class="text-primary font-semibold hover:underline" routerLink="/terms">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" routerLink="/privacy">Privacy Policy</a>
        </label>
      </div>

      <!-- Create Account Action -->
      <button nz-button nzType="primary" class="w-full h-12 font-bold rounded-lg shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2"
              [disabled]="signupForm.invalid" type="submit">
        Create Account
      </button>
    </form>

    <!-- Social Divider -->
    <div class="px-8 mt-8 relative flex items-center">
      <div class="flex-grow border-t border-border-gray dark:border-primary/20"></div>
      <span class="flex-shrink mx-4 text-xs font-medium text-gray-400 uppercase tracking-widest bg-white dark:bg-background-dark px-2">Or sign up with</span>
      <div class="flex-grow border-t border-border-gray dark:border-primary/20"></div>
    </div>

    <!-- Social Icons Row -->
    <div class="px-8 mt-6 flex justify-center gap-4">
      <button nz-button nzType="default" class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-input-gray dark:hover:bg-primary/10 transition-colors">
        <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyAaYw5HYP9_OX3F_07KthWS_2wFN5J28Q3GZXpEN1LmB0p7ftX73GkXsJGl1eSfClIf02KgDkRRAlJ8TlGOsiE_gtbo2gA4jgellLbjywqaQF9QgVCJiHgUp8mKgh_TNosxWe0E3m2zd3lwNeiUxYYOuV7kl4_nuY18N0vywWpEPfIDZ1f4VzUK0boHOzgI5Oq_fPTx_H-aSI81VN9ZCTmng6W-bBre-_D2C8aM4n85-fuJ_hbBa5dhUmbapE4PZ9dd21u3V5V_vo" />
      </button>
      <button nz-button nzType="default" class="w-12 h-12 rounded-full flex items-center justify-center hover:bg-input-gray dark:hover:bg-primary/10 transition-colors">
        <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <div class="px-8 py-8 mt-2 text-center border-t border-border-gray/50 dark:border-primary/10">
      <p class="text-sm text-[#6e757c] dark:text-gray-400">
        Already have an account? <a class="text-primary font-bold hover:underline" routerLink="/login">Login</a>
      </p>
    </div>
  </div>
</div>
