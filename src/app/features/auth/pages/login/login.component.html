<div class="login-page">
  <!-- Background decorative element -->
  <div class="bg-pattern"></div>

  <!-- Login Card -->
  <div class="login-card-wrapper">
    <div class="login-card">

      <!-- Logo & Header -->
      <div class="card-header">
        <div class="logo-box">
          <span nz-icon nzType="shopping-cart" nzTheme="outline" class="logo-icon"></span>
        </div>
        <h1 class="card-title">Chào mừng trở lại</h1>
        <p class="card-subtitle">Sẵn sàng cho màn cosplay tiếp theo của bạn?</p>
      </div>

      <!-- Social Login -->
      <div class="social-buttons">
        <button class="social-btn" type="button" (click)="loginWithGoogle()">
          <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Tiếp tục với Google</span>
        </button>
        <button class="social-btn" type="button" (click)="loginWithFacebook()">
          <svg class="social-icon" fill="#1877F2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span>Tiếp tục với Facebook</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Hoặc đăng nhập bằng email</span>
        <div class="divider-line"></div>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

        <!-- Email -->
        <div class="field-group">
          <label class="field-label">Địa chỉ email</label>
          <div class="input-wrapper">
            <span nz-icon nzType="mail" nzTheme="outline" class="input-prefix-icon"></span>
            <input
              type="email"
              class="field-input has-prefix"
              [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.dirty"
              formControlName="email"
              placeholder="name@example.com"
            />
          </div>
          <span
            class="field-error"
            *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.dirty"
          >
            Vui lòng nhập email hợp lệ
          </span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <div class="password-label-row">
            <label class="field-label">Mật khẩu</label>
            <a class="forgot-link" routerLink="/auth/forgot-password">Quên mật khẩu?</a>
          </div>
          <div class="input-wrapper">
            <span nz-icon nzType="lock" nzTheme="outline" class="input-prefix-icon"></span>
            <input
              [type]="passwordVisible ? 'text' : 'password'"
              class="field-input has-prefix"
              [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.dirty"
              formControlName="password"
              placeholder="Nhập mật khẩu của bạn"
            />
            <button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
              <span nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" nzTheme="outline"></span>
            </button>
          </div>
          <span
            class="field-error"
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.dirty"
          >
            Mật khẩu phải có ít nhất 8 ký tự
          </span>
        </div>

        <!-- Submit Button -->
        <button
          nz-button
          nzType="primary"
          nzSize="large"
          class="submit-btn"
          type="submit"
          [nzLoading]="isLoading"
        >
          <span>Đăng nhập</span>
          <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
        </button>
      </form>

      <!-- Footer -->
      <div class="card-footer">
        <p>Chưa có tài khoản? <a routerLink="/auth/register" class="link">Đăng ký ngay</a></p>
      </div>

    </div>
  </div>

  <!-- Bottom gradient bar -->
  <div class="bottom-bar"></div>
</div>
